# mlops/kafka/docker-compose.yml
# AlphaFlow — Real-time Streaming Infrastructure
#
# Services:
#   zookeeper  — Kafka coordination
#   kafka      — Message broker
#   kafka-ui   — Web UI to monitor topics (localhost:8090)
#
# Usage:
#   cd mlops/kafka
#   docker-compose up -d
#   open http://localhost:8090
#
# Topics created automatically:
#   alphaflow.prices.equity   — equity OHLCV tick data
#   alphaflow.prices.crypto   — crypto tick data (Binance)
#   alphaflow.news.raw        — raw news articles
#   alphaflow.features.ready  — engineered features (triggers rebalance)
#   alphaflow.signals         — model predictions + signals
#   alphaflow.allocation      — portfolio weights (final output)

version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: alphaflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: alphaflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168    # 7 days retention
      KAFKA_MESSAGE_MAX_BYTES: 10485760 # 10MB max message
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: alphaflow-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating AlphaFlow Kafka topics...'

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alphaflow.prices.equity \
        --partitions 3 --replication-factor 1 \
        --config retention.ms=604800000

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alphaflow.prices.crypto \
        --partitions 3 --replication-factor 1 \
        --config retention.ms=604800000

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alphaflow.news.raw \
        --partitions 2 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alphaflow.features.ready \
        --partitions 3 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alphaflow.signals \
        --partitions 1 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alphaflow.allocation \
        --partitions 1 --replication-factor 1

      echo 'Topics created:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: alphaflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: alphaflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    restart: unless-stopped