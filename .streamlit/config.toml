# .streamlit/config.toml
# Streamlit configuration for AlphaFlow dashboard

[theme]
primaryColor = "#00e5ff"
backgroundColor = "#070a0f"
secondaryBackgroundColor = "#0d1117"
textColor = "#c9d1d9"
font = "monospace"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false